name: TrendAI Code Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    name: TMAS Security Scan
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: pip install -r requirements.txt || true

      - name: Download and install TMAS
        run: |
          curl -L https://ast-cli.xdr.trendmicro.com/tmas-cli/latest/tmas-cli_Linux_x86_64.tar.gz \
            -o tmas.tar.gz
          tar -xzf tmas.tar.gz
          chmod +x tmas
          sudo mv tmas /usr/local/bin/tmas

      - name: Run TMAS scan (vulnerabilities + secrets)
        env:
          TMAS_API_KEY: ${{ secrets.TMAS_API_KEY }}
        run: |
          tmas scan dir:. \
            --vulnerabilities \
            --secrets \
            --region eu-central-1 \
            --evaluatePolicy
